<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Order - AZ Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff7b00;
            --dark-bg: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--dark-bg);
            color: white;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, rgba(255, 123, 0, 0.1), transparent 50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        .track-container {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 32px; color: var(--primary); margin-bottom: 10px; }
        .header p { color: #888; font-size: 14px; }

        /* Search Box */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 10px 15px;
            font-size: 16px;
        }
        .search-box button {
            background: var(--primary);
            color: #1a1a2e;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .search-box button:hover { transform: scale(1.05); }

        /* Stepper */
        .stepper {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-bottom: 50px;
            padding-top: 20px;
        }
        .stepper::before {
            content: "";
            position: absolute;
            top: 45px;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            z-index: 1;
        }
        .step-progress {
            position: absolute;
            top: 45px;
            left: 0;
            height: 4px;
            background: var(--primary);
            z-index: 2;
            transition: width 1s ease;
            width: 0%;
        }
        .step {
            position: relative;
            z-index: 3;
            text-align: center;
            width: 100px;
        }
        .circle {
            width: 50px;
            height: 50px;
            background: #1a1a2e;
            border: 4px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: 0.5s;
        }
        .step.active .circle {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 123, 0, 0.4);
            color: var(--primary);
        }
        .step.completed .circle {
            background: var(--primary);
            border-color: var(--primary);
            color: #1a1a2e;
        }
        .step .label { font-size: 12px; font-weight: 600; color: #666; transition: 0.3s; }
        .step.active .label { color: white; }

        /* Order Info */
        .order-info {
            display: none;
            animation: fadeIn 0.5s ease;
            border-top: 1px solid var(--glass-border);
            padding-top: 30px;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .info-item { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border: 1px solid var(--glass-border); }
        .info-item label { display: block; font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .info-item value { display: block; font-size: 15px; font-weight: 600; color: #ddd; }

        .items-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .items-table th { text-align: left; color: #666; font-size: 12px; padding-bottom: 10px; }
        .items-table td { padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.05); }

        .back-link { margin-top: 30px; color: #888; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: var(--primary); }

        .error-msg { text-align: center; color: #e74c3c; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div class="track-container">
        <div class="header">
            <h1>🍴 Track Your Order</h1>
            <p>Enter your order reference number to see real-time updates</p>
        </div>

        <div class="search-box">
            <input type="text" id="orderRef" placeholder="e.g. ORD-0001" autocomplete="off">
            <button onclick="trackOrder()">Track Now</button>
        </div>

        <div class="error-msg" id="errorMsg">Order not found. Please check your reference number.</div>

        <!-- Progress Stepper -->
        <div class="stepper" id="stepper" style="display:none;">
            <div class="step-progress" id="progressLine"></div>
            <div class="step" id="step-pending">
                <div class="circle">📋</div>
                <div class="label">Placed</div>
            </div>
            <div class="step" id="step-preparing">
                <div class="circle">👨‍🍳</div>
                <div class="label">Preparing</div>
            </div>
            <div class="step" id="step-dispatched">
                <div class="circle">🛵</div>
                <div class="label">Dispatched</div>
            </div>
            <div class="step" id="step-delivered">
                <div class="circle">✨</div>
                <div class="label">Delivered</div>
            </div>
        </div>

        <!-- Extra Info -->
        <div class="order-info" id="orderInfo">
            <div class="info-grid">
                <div class="info-item">
                    <label>Order Type</label>
                    <value id="val-type">—</value>
                </div>
                <div class="info-item">
                    <label>Estimated time</label>
                    <value id="val-time">25-35 Mins</value>
                </div>
            </div>
            <div class="info-item" style="margin-bottom: 20px;">
                <label>Deliver To</label>
                <value id="val-address">—</value>
            </div>
            
            <h3 style="font-size: 16px; margin-bottom: 15px;">Order Items</h3>
            <table class="items-table" id="itemsTable">
                <!-- Items Injected Here -->
            </table>

            <div style="text-align: right; margin-top: 30px; font-size: 20px;">
                <span style="color:#888; font-size:14px;">Total Amount:</span>
                <b style="color:var(--primary);" id="val-total">₹0</b>
            </div>
        </div>
    </div>

    <a href="home.html" class="back-link">← Back to Restaurant</a>

    <script>
        // Check if ref in URL
        const urlParams = new URLSearchParams(window.location.search);
        const urlRef = urlParams.get('ref');
        if (urlRef) {
            document.getElementById('orderRef').value = urlRef;
            trackOrder();
        }

        async function trackOrder() {
            const ref = document.getElementById('orderRef').value.trim();
            if (!ref) return;

            const errorEl = document.getElementById('errorMsg');
            const infoEl = document.getElementById('orderInfo');
            const stepperEl = document.getElementById('stepper');
            errorEl.style.display = 'none';

            try {
                const response = await fetch(`/api/track/${ref}`);
                const data = await response.json();

                if (data.success) {
                    const order = data.order;
                    stepperEl.style.display = 'flex';
                    infoEl.style.display = 'block';
                    
                    // Update Details
                    document.getElementById('val-type').textContent = order.order_type;
                    document.getElementById('val-address').textContent = order.address || 'Takeaway Pickup';
                    document.getElementById('val-total').textContent = '₹' + order.total;

                    // Render Items
                    const table = document.getElementById('itemsTable');
                    table.innerHTML = `<tr><th>Item</th><th style="text-align:right">Qty</th><th style="text-align:right">Price</th></tr>`;
                    data.items.forEach(item => {
                        table.innerHTML += `
                            <tr>
                                <td>${item.item_name}</td>
                                <td style="text-align:right">${item.quantity}</td>
                                <td style="text-align:right">₹${item.price * item.quantity}</td>
                            </tr>
                        `;
                    });

                    // Update Stepper
                    updateStepper(order.status);
                } else {
                    stepperEl.style.display = 'none';
                    infoEl.style.display = 'none';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                errorEl.textContent = 'Server connection error.';
                errorEl.style.display = 'block';
            }
        }

        function updateStepper(status) {
            const steps = ['Pending', 'Preparing', 'Dispatched', 'Delivered'];
            const currentIndex = steps.indexOf(status);
            const progressLine = document.getElementById('progressLine');
            
            // Set line width
            const progressMap = { 'Pending': 0, 'Preparing': 33, 'Dispatched': 66, 'Delivered': 100 };
            progressLine.style.width = progressMap[status] + '%';

            steps.forEach((s, idx) => {
                const el = document.getElementById('step-' + s.toLowerCase());
                el.classList.remove('active', 'completed');
                
                if (idx < currentIndex) {
                    el.classList.add('completed');
                } else if (idx === currentIndex) {
                    el.classList.add('active');
                }
            });
        }
    </script>
</body>
</html>
