<!DOCTYPE html>
<html>
<head>
    <title>AZ Restaurant - Table Booking</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family:'Poppins', 'Segoe UI', sans-serif;
        background:url("restaurant.jpg") center/cover no-repeat fixed;
        min-height:100vh;
        padding-bottom:40px;
    }

    body::before{
        content:"";
        position:fixed;
        width:100%;
        height:100%;
        background:linear-gradient(135deg, rgba(0,0,0,0.7), rgba(20,10,0,0.8));
        z-index:0;
    }

    /* Title */
    .title{
        text-align:center;
        padding-top:30px;
        position:relative;
        z-index:1;
    }

    .title h1{
        font-size:48px;
        font-weight:700;
        letter-spacing:3px;
        background:linear-gradient(45deg, #ff7b00, #ffcc00);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        background-clip:text;
    }

    .title p{
        color:#999;
        font-size:13px;
        letter-spacing:5px;
        margin-top:5px;
        text-transform:uppercase;
    }

    /* Navbar */
    .navbar{
        position:relative;
        z-index:1;
        display:flex;
        justify-content:center;
        margin:20px auto;
        width:fit-content;
        padding:14px 40px;
        border-radius:50px;
        background:linear-gradient(45deg, #ff7b00, #ffcc00);
        box-shadow:0 8px 32px rgba(255,123,0,0.3);
    }

    .navbar a{
        text-decoration:none;
        color:#1a1a2e;
        font-size:16px;
        font-weight:600;
        margin:0 25px;
        transition:all 0.3s ease;
        position:relative;
    }

    .navbar a:hover{
        color:white;
        transform:scale(1.05);
    }

    .navbar a.active{
        color:white;
    }

    .navbar a.active::after{
        content:"";
        position:absolute;
        bottom:-6px;
        left:0;
        width:100%;
        height:3px;
        background:white;
        border-radius:2px;
    }

    /* Main Container */
    .container{
        position:relative;
        z-index:1;
        max-width:950px;
        margin:30px auto;
        padding:40px;
        border-radius:25px;
        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(12px);
        border:1px solid rgba(255,255,255,0.1);
        box-shadow:0 15px 40px rgba(0,0,0,0.3);
        text-align:center;
        color:white;
    }

    .container h2{
        font-size:26px;
        font-weight:600;
        margin-bottom:10px;
    }

    .container h2 span{
        background:linear-gradient(45deg, #ff7b00, #ffcc00);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        background-clip:text;
    }

    .container .subtitle{
        color:#888;
        font-size:14px;
        margin-bottom:30px;
    }

    /* Tables Grid */
    .tables{
        display:grid;
        grid-template-columns:repeat(6, 1fr);
        gap:15px;
        margin-bottom:35px;
    }

    .table{
        height:100px;
        background:rgba(255,123,0,0.15);
        border:2px solid rgba(255,123,0,0.3);
        border-radius:20px;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        font-size:20px;
        font-weight:700;
        color:#ffcc00;
        cursor:pointer;
        transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .table .table-icon{
        font-size:28px;
        margin-bottom:5px;
    }

    .table .table-status{
        font-size:10px;
        font-weight:500;
        letter-spacing:2px;
        color:#888;
        margin-top:4px;
    }

    .table:hover{
        transform:translateY(-6px) scale(1.05);
        background:rgba(255,123,0,0.25);
        box-shadow:0 12px 30px rgba(255,123,0,0.3);
        border-color:#ff7b00;
    }

    .table.selected{
        background:linear-gradient(145deg, rgba(46,204,113,0.25), rgba(39,174,96,0.15));
        border-color:#2ecc71;
        color:#2ecc71;
        box-shadow:0 0 25px rgba(46,204,113,0.3);
    }

    .table.selected .table-status{
        color:#2ecc71;
    }

    .table.occupied{
        background:rgba(255,255,255,0.03);
        border-color:rgba(255,255,255,0.08);
        color:#555;
        cursor:not-allowed;
        opacity:0.5;
    }

    .table.occupied:hover{
        transform:none;
        box-shadow:none;
    }

    /* Booking Form */
    .booking-form{
        max-width:500px;
        margin:0 auto;
        text-align:left;
    }

    .booking-form h3{
        text-align:center;
        font-size:18px;
        font-weight:600;
        margin-bottom:20px;
        color:#ffcc00;
    }

    .form-row{
        display:flex;
        gap:15px;
        margin-bottom:15px;
    }

    .input-group{
        flex:1;
    }

    .input-group label{
        display:block;
        font-size:13px;
        font-weight:500;
        color:#ccc;
        margin-bottom:8px;
    }

    .input-group input,
    .input-group select{
        width:100%;
        padding:13px 16px;
        border:1px solid rgba(255,255,255,0.15);
        border-radius:12px;
        outline:none;
        font-size:14px;
        font-family:'Poppins', sans-serif;
        background:rgba(255,255,255,0.06);
        color:white;
        transition:all 0.3s ease;
    }

    .input-group input::placeholder{
        color:#666;
    }

    .input-group input:focus,
    .input-group select:focus{
        border-color:#ff7b00;
        box-shadow:0 0 20px rgba(255,123,0,0.15);
    }

    .input-group select option{
        background:#1a1a2e;
        color:white;
    }

    /* Selected Table Display */
    .selected-display{
        text-align:center;
        padding:15px;
        margin-bottom:20px;
        border-radius:12px;
        background:rgba(255,123,0,0.1);
        border:1px solid rgba(255,123,0,0.2);
        font-size:14px;
        color:#ffcc00;
        transition:all 0.3s ease;
    }

    .selected-display.has-table{
        background:rgba(46,204,113,0.1);
        border-color:rgba(46,204,113,0.3);
        color:#2ecc71;
    }

    /* Submit Button */
    .submit-btn{
        width:100%;
        padding:14px;
        border:none;
        border-radius:14px;
        background:linear-gradient(45deg, #ff7b00, #ffcc00);
        color:#1a1a2e;
        font-size:16px;
        font-weight:700;
        font-family:'Poppins', sans-serif;
        cursor:pointer;
        transition:all 0.3s ease;
        letter-spacing:1px;
        text-transform:uppercase;
        margin-top:10px;
    }

    .submit-btn:hover{
        transform:translateY(-3px);
        box-shadow:0 10px 30px rgba(255,123,0,0.4);
    }

    .submit-btn:disabled{
        opacity:0.4;
        cursor:not-allowed;
        transform:none;
        box-shadow:none;
    }

    /* Responsive */
    @media (max-width:768px){
        .tables{
            grid-template-columns:repeat(2, 1fr);
        }
        .form-row{
            flex-direction:column;
        }
        .container{
            margin:20px;
            padding:25px;
        }
        .navbar{
            flex-wrap:wrap;
            gap:10px;
            padding:12px 20px;
        }
        .navbar a{
            margin:5px 12px;
            font-size:14px;
        }
        .title h1{
            font-size:32px;
        }
    }
    </style>
</head>
<body>

    <div class="title">
        <h1>AZ RESTAURANT</h1>
        <p>Delicious food, delivered fresh</p>
    </div>

    <div class="navbar">
        <a href="home.html">HOME</a>
        <a href="table.html" class="active">TABLE BOOKING</a>
        <a href="takeaway.html">TAKE AWAY</a>
        <a href="hello.html">ORDER ONLINE</a>
    </div>

    <div class="container">
        <h2>🪑 <span>Reserve Your Table</span></h2>
        <p class="subtitle">Select a table and fill in your details</p>

        <!-- Live Table Grid -->
        <div class="tables" id="tablesContainer">
            <div style="grid-column: span 6; padding: 20px; color: #888;">Detecting table availability...</div>
        </div>

        <!-- Selected Table -->
        <div class="selected-display" id="selectedDisplay">
            👆 Click on a table above to select
        </div>

        <!-- Booking Form -->
        <form class="booking-form" id="bookingForm">
            <h3>📋 Booking Details</h3>

            <div class="form-row">
                <div class="input-group">
                    <label>Your Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter phone number" required>
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label>Reservation Date & Time</label>
                    <input type="datetime-local" id="datetime" required>
                </div>
                <div class="input-group">
                    <label>Number of Guests</label>
                    <select id="guests" required>
                        <option value="">Select guests</option>
                        <option value="1">1 Guest</option>
                        <option value="2">2 Guests</option>
                        <option value="3">3 Guests</option>
                        <option value="4">4 Guests</option>
                        <option value="5">5 Guests</option>
                        <option value="6">6 Guests</option>
                    </select>
                </div>
            </div>

            <div class="error-msg" id="errorMsg" style="color:#e74c3c; font-size:13px; margin-bottom:10px; display:none;"></div>
            <button type="submit" class="submit-btn">Confirm Reservation →</button>
        </form>
    </div>

    <script>
    let selectedTable = null;

    // Fetch live table status
    async function loadTables() {
        try {
            const response = await fetch('/api/admin/data');
            const data = await response.json();
            const bookings = data.bookings || [];
            
            const container = document.getElementById('tablesContainer');
            container.innerHTML = '';

            for (let i = 1; i <= 12; i++) {
                const tableId = 'T' + i;
                const isOccupied = bookings.some(b => b.table_id === tableId && b.status === 'Confirmed');

                const div = document.createElement('div');
                div.className = `table ${isOccupied ? 'occupied' : ''}`;
                div.innerHTML = `
                    <span class="table-icon">${isOccupied ? '🔒' : '🪑'}</span>
                    ${tableId}
                    <span class="table-status">${isOccupied ? 'OCCUPIED' : 'AVAILABLE'}</span>
                `;
                
                if (!isOccupied) {
                    div.onclick = () => selectTable(div, tableId);
                }
                container.appendChild(div);
            }
        } catch (err) {
            console.error('Error loading tables:', err);
        }
    }

    loadTables();

    function selectTable(element, tableName){
        if(element.classList.contains('occupied')) return;
        document.querySelectorAll('.table').forEach(t => {
            if(!t.classList.contains('occupied')){
                t.classList.remove('selected');
                t.querySelector('.table-status').textContent = 'AVAILABLE';
                t.querySelector('.table-icon').textContent = '🪑';
            }
        });
        element.classList.add('selected');
        element.querySelector('.table-status').textContent = 'SELECTED';
        element.querySelector('.table-icon').textContent = '✅';
        selectedTable = tableName;
        
        let display = document.getElementById('selectedDisplay');
        display.textContent = '✅ Table ' + tableName + ' selected';
        display.classList.add('has-table');
    }

    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const err = document.getElementById('errorMsg');
        err.style.display = 'none';

        if (!selectedTable) {
            err.textContent = 'Please select a table first!';
            err.style.display = 'block';
            return;
        }

        const btn = e.target.querySelector('button');
        btn.innerHTML = 'Confirming...';

        const data = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            table_id: selectedTable,
            guests: document.getElementById('guests').value,
            booking_datetime: document.getElementById('datetime').value
        };

        try {
            const response = await fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            if (result.success) {
                window.location.href = `end.html?ref=${result.bookingRef}&type=booking`;
            } else {
                err.textContent = result.error;
                err.style.display = 'block';
                btn.innerHTML = 'Confirm Reservation →';
            }
        } catch (error) {
            err.textContent = 'Server error. Please try again.';
            err.style.display = 'block';
            btn.innerHTML = 'Confirm Reservation →';
        }
    });
    </script>
</body>
</html>
