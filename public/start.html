<!DOCTYPE html>
<html>
<head>
    <title>AZ Restaurant - Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family:'Poppins', 'Segoe UI', sans-serif;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:url("restaurant.jpg") center/cover no-repeat;
    }

    body::before{
        content:"";
        position:fixed;
        width:100%;
        height:100%;
        background:linear-gradient(135deg, rgba(0,0,0,0.7), rgba(20,10,0,0.85));
        z-index:0;
    }

    /* Floating particles */
    body::after{
        content:"🍽️";
        position:fixed;
        top:15%;
        left:10%;
        font-size:60px;
        opacity:0.08;
        z-index:0;
        animation:float 6s ease-in-out infinite;
    }

    @keyframes float{
        0%,100%{ transform:translateY(0) rotate(0deg); }
        50%{ transform:translateY(-30px) rotate(10deg); }
    }

    .page-wrapper{
        position:relative;
        z-index:1;
        text-align:center;
    }

    /* Title */
    .title{
        margin-bottom:35px;
    }

    .title h1{
        font-size:52px;
        font-weight:700;
        letter-spacing:4px;
        background:linear-gradient(45deg, #ff7b00, #ffcc00);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        background-clip:text;
    }

    .title p{
        color:#999;
        font-size:13px;
        letter-spacing:6px;
        margin-top:8px;
        text-transform:uppercase;
    }

    /* Login Card */
    .login-box{
        width:400px;
        padding:40px;
        border-radius:25px;
        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(15px);
        border:1px solid rgba(255,255,255,0.1);
        box-shadow:0 15px 45px rgba(0,0,0,0.5);
        text-align:center;
        color:white;
    }

    .login-box h2{
        font-size:24px;
        font-weight:600;
        margin-bottom:8px;
    }

    .login-box .subtitle{
        color:#999;
        font-size:13px;
        margin-bottom:30px;
    }

    /* Input Fields */
    .input-group{
        margin-bottom:20px;
        text-align:left;
    }

    .input-group label{
        display:block;
        font-size:13px;
        font-weight:500;
        color:#ccc;
        margin-bottom:8px;
        letter-spacing:0.5px;
    }

    .input-group input{
        width:100%;
        padding:14px 18px;
        border:1px solid rgba(255,255,255,0.15);
        border-radius:14px;
        outline:none;
        font-size:15px;
        font-family:'Poppins', sans-serif;
        background:rgba(255,255,255,0.06);
        color:white;
        transition:all 0.3s ease;
    }

    .input-group input::placeholder{
        color:#666;
    }

    .input-group input:focus{
        border-color:#ff7b00;
        box-shadow:0 0 20px rgba(255,123,0,0.15);
        background:rgba(255,255,255,0.1);
    }

    /* Login Button */
    .login-btn{
        width:100%;
        padding:14px;
        border:none;
        border-radius:14px;
        background:linear-gradient(45deg, #ff7b00, #ffcc00);
        color:#1a1a2e;
        font-size:16px;
        font-weight:700;
        font-family:'Poppins', sans-serif;
        cursor:pointer;
        transition:all 0.3s ease;
        letter-spacing:1px;
        text-transform:uppercase;
        margin-top:10px;
    }

    .login-btn:hover{
        transform:translateY(-3px);
        box-shadow:0 10px 30px rgba(255,123,0,0.4);
    }

    .login-btn:active{
        transform:translateY(0);
    }

    /* Divider */
    .divider{
        display:flex;
        align-items:center;
        margin:25px 0;
        color:#555;
        font-size:12px;
    }

    .divider::before,
    .divider::after{
        content:"";
        flex:1;
        height:1px;
        background:linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }

    .divider span{
        padding:0 15px;
        color:#666;
    }

    /* Footer text */
    .login-footer{
        margin-top:20px;
        font-size:13px;
        color:#777;
    }

    .login-footer a{
        color:#ff7b00;
        text-decoration:none;
        font-weight:500;
    }

    .login-footer a:hover{
        text-decoration:underline;
        color:#ffcc00;
    }

    /* Brand badge */
    .brand-badge{
        position:fixed;
        bottom:20px;
        color:#444;
        font-size:12px;
        letter-spacing:2px;
        z-index:1;
    }

    @media (max-width:500px){
        .login-box{
            width:90%;
            padding:30px 25px;
        }
        .title h1{
            font-size:36px;
        }
    }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="title">
            <h1>AZ RESTAURANT</h1>
            <p>Delicious food, delivered fresh</p>
        </div>

        <div class="login-box">
            <h2>🍽️ Welcome Back</h2>
            <p class="subtitle">Sign in to your account</p>

            <form id="loginForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="error-msg" id="errorMsg" style="color: #e74c3c; font-size: 13px; margin-top: 10px; display: none;"></div>
                <button type="submit" class="login-btn">Login →</button>
            </form>

            <div class="divider">
                <span>Fresh Food • Great Taste</span>
            </div>

            <div class="login-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </div>

    <div class="brand-badge">
        © 2026 AZ RESTAURANT
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('button');
            const err = document.getElementById('errorMsg');
            btn.innerHTML = 'Logging in...';
            err.style.display = 'none';

            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    sessionStorage.setItem('user', JSON.stringify(result.user));
                    window.location.href = 'home.html';
                } else {
                    err.textContent = result.error;
                    err.style.display = 'block';
                    btn.innerHTML = 'Login →';
                }
            } catch (error) {
                err.textContent = 'Server error. Please try again.';
                err.style.display = 'block';
                btn.innerHTML = 'Login →';
            }
        });
    </script>
</body>
</html>
