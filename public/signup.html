<!DOCTYPE html>
<html>
<head>
    <title>AZ Restaurant - Sign Up</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    /* CSS identical to start.html for consistency */
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ font-family:'Poppins', sans-serif; height:100vh; display:flex; justify-content:center; align-items:center; background:url("restaurant.jpg") center/cover no-repeat; }
    body::before{ content:""; position:fixed; width:100%; height:100%; background:linear-gradient(135deg, rgba(0,0,0,0.7), rgba(20,10,0,0.85)); z-index:0; }
    .page-wrapper{ position:relative; z-index:1; text-align:center; }
    .title h1{ font-size:42px; font-weight:700; letter-spacing:4px; background:linear-gradient(45deg, #ff7b00, #ffcc00); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom: 20px;}
    .login-box{ width:400px; padding:35px; border-radius:25px; background:rgba(255,255,255,0.08); backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.1); box-shadow:0 15px 45px rgba(0,0,0,0.5); text-align:center; color:white; }
    .login-box h2{ font-size:22px; margin-bottom:8px; }
    .input-group{ margin-bottom:15px; text-align:left; }
    .input-group label{ display:block; font-size:12px; font-weight:500; color:#ccc; margin-bottom:5px; }
    .input-group input{ width:100%; padding:12px 15px; border:1px solid rgba(255,255,255,0.15); border-radius:12px; outline:none; font-size:14px; background:rgba(255,255,255,0.06); color:white; font-family:'Poppins', sans-serif;}
    .input-group input:focus{ border-color:#ff7b00; box-shadow:0 0 20px rgba(255,123,0,0.15); }
    .login-btn{ width:100%; padding:14px; border:none; border-radius:12px; background:linear-gradient(45deg, #ff7b00, #ffcc00); color:#1a1a2e; font-size:15px; font-weight:700; cursor:pointer; margin-top:10px; font-family:'Poppins', sans-serif;}
    .login-footer{ margin-top:20px; font-size:13px; color:#777; }
    .login-footer a{ color:#ff7b00; text-decoration:none; font-weight:500; }
    .error-msg { color: #e74c3c; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="title">
            <h1>AZ RESTAURANT</h1>
        </div>

        <div class="login-box">
            <h2>📝 Create an Account</h2>
            
            <form id="signupForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter phone number" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>

                <div class="error-msg" id="errorMsg"></div>
                <button type="submit" class="login-btn">Register →</button>
            </form>

            <div class="login-footer">
                Already have an account? <a href="start.html">Login</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('button');
            const err = document.getElementById('errorMsg');
            btn.innerHTML = 'Registering...';
            err.style.display = 'none';

            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('Registration successful! Please login.');
                    window.location.href = 'start.html';
                } else {
                    err.textContent = result.error;
                    err.style.display = 'block';
                    btn.innerHTML = 'Register →';
                }
            } catch (error) {
                err.textContent = 'Server error. Please try again.';
                err.style.display = 'block';
                btn.innerHTML = 'Register →';
            }
        });
    </script>
</body>
</html>
